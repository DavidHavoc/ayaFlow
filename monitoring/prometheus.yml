global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "ayaflow"
    static_configs:
      # ayaFlow uses network_mode: "service:web", so it shares the
      # web container's network stack.  Prometheus reaches it via the
      # "web" hostname on port 3000 (ayaFlow's API port).
      - targets: ["web:3000"]
    metrics_path: "/metrics"
